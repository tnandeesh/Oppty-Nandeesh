<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Great Canyon</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#e5e5e5;
    padding:30px;
}

.main-container{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:10px;
    overflow:hidden;
    display:flex;
}

.image-section{
    width:50%;
    position:relative;
    padding-left: 0px;
}

.image-section img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.year-tag{
    position:absolute;
    top:15px;
    left:15px;
    background:#ff8c00;
    color:white;
    padding:5px 10px;
    font-size:12px;
    font-weight:bold;
}

.content-section{
    width:50%;
    padding:40px;
    padding-top: 80px;
}

.badge{
    display:inline-block;
    background:#dff3e4;
    color:#2e7d32;
    padding:6px 12px;
    border-radius:5px;
    font-size:12px;
    font-weight:bold;
}

.location{
    color:#ff8c00;
    letter-spacing:3px;
    font-size:15px;
    font-weight:800;
    margin-top:15px;
}

.title{
    font-size:48px;
    font-weight:900;
    line-height: 40px;
    margin:10px 0;
    color:#111;
}

.line{
    border-top:1px solid #ddd;
    margin:20px 0;
}

.description{
    color:#666;
    line-height:1.6;
    font-size:14px;
}

.magazine{
    text-align:right;
    margin-top:30px;
    font-size:12px;
    font-weight:bold;
}

.button-group{
    margin-top:40px;
}

.btn{
    padding:8px 14px;
    border:1px solid #ccc;
    background:white;
    font-size:12px;
    margin-right:8px;
    cursor:pointer;
}

.btn-dark{
    background:#1e2a38;
    color:white;
    border:none;
}

</style>
</head>

<body>

<section class="main-container">

    <figure class="image-section">
        <span class="year-tag">EST. 1994</span>
        <img src="../assets/bailey-zindel-NRQV-hBF10M-unsplash.jpg" alt="Canyon Image">
    </figure>

    <article class="content-section">

        <span class="badge">&check; OFFICIAL EXPEDITION</span>

        <p class="location">NORTH AMERICA / UTAH</p>

        <h1 class="title">THE GREAT<br>CANYON</h1>

        <div class="line"></div>

        <p class="description">
        “ A vast landscape carved by time itself. This geological marvel 
        offers more than just views; it offers a perspective on the 
        sheer scale of our planet's history.”
        </p>

        <p class="magazine">GEO MAGAZINE</p>

        <div class="button-group">
            <button class="btn btn-dark">ADVENTURE</button>
            <button class="btn">GEOLOGY</button>
            <button class="btn">HIKING</button>
        </div>

    </article>

</section>

</body>
</html>
